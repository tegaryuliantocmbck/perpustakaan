{% extends 'base.html' %}
{% block content %}
<div class="page-head">
  <div class="back"><a href="{% url 'buku_list' %}">←</a>
    <div><div class="kicker">Kelola Buku</div><h1 class="title">Hapus Buku</h1></div>
  </div>
</div>
<div class="card" style="max-width:560px">
  <p style="margin:0 0 6px">Anda akan menghapus:</p>
  <p style="font-weight:700;margin:0 0 6px">{{ b.judul }}</p>
  <p class="muted" style="font-size:13px;margin:0 0 18px">Data peminjaman yang menggunakan buku ini tidak akan otomatis dihapus.</p>
  <form method="post" style="display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--line);padding-top:16px">{% csrf_token %}
    <a href="{% url 'buku_list' %}" class="btn btn-outline">Batal</a>
    <button class="btn btn-danger">Hapus</button>
  </form>
</div>
{% endblock %}
